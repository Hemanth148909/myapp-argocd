apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 8
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

      annotations:
        redeployTimestamp: "v3"

    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
